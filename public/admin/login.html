<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin - ISMAP²</title>
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-login">
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <img src="../assets/images/logo.png" alt="ISMAP² Logo" class="login-logo">
                <h2>Administration ISMAP²</h2>
                <p>Connectez-vous pour accéder au back-office</p>
            </div>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" placeholder="admin@ismap2.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                        <i class="fas fa-eye toggle-password"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember"> Se souvenir de moi
                    </label>
                </div>
                <button type="submit" class="btn-login">Se connecter</button>
                <div class="login-footer">
                    <a href="#">Mot de passe oublié ?</a>
                </div>
            </form>
        </div>
        <div class="login-info">
            <p><i class="fas fa-shield-alt"></i> Accès sécurisé - Seul le personnel autorisé peut accéder à cette interface</p>
        </div>
    </div>
    <script src="../js/admin.js"></script>
</body>
</html>
